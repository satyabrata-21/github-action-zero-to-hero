<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satyabrata Behera | DevOps Engineer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body,html{
  height:100%;
  overflow:hidden;
}

/* Background Ubuntu Image */
.background{
  position:fixed;
  width:100%;
  height:100%;
  background:url('ubuntu.png') no-repeat center center/cover;
  z-index:-2;
}

/* Dark overlay */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom,rgba(0,0,0,0.4),rgba(0,0,0,0.6));
  z-index:-1;
}

/* Top Bar */
.topbar{
  position:fixed;
  top:0;
  width:100%;
  height:40px;
  background:#111;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
}

/* Left Dock */
.dock{
  position:fixed;
  left:0;
  top:40px;
  width:60px;
  height:calc(100% - 40px);
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:20px;
  gap:20px;
}

.dock img{
  width:35px;
  cursor:pointer;
  transition:0.3s;
}

.dock img:hover{
  transform:scale(1.2);
}

/* Desktop Icons */
.desktop-icons{
  position:fixed;
  right:40px;
  top:100px;
  display:flex;
  flex-direction:column;
  gap:40px;
  color:#fff;
  text-align:center;
}

.icon{
  cursor:pointer;
  transition:0.3s;
}

.icon img{
  width:60px;
}

.icon:hover{
  transform:scale(1.1);
}

/* Center Intro */
.center-box{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  padding:50px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  color:#fff;
  text-align:center;
  animation:fadeIn 2s ease;
}

.center-box h1{
  font-size:2.5rem;
  margin-bottom:15px;
}

.center-box p{
  margin-bottom:25px;
}

.btn{
  padding:10px 25px;
  border:none;
  border-radius:30px;
  background:linear-gradient(90deg,#ff512f,#dd2476);
  color:#fff;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 20px rgba(255,0,100,0.6);
}

@keyframes fadeIn{
  from{opacity:0; transform:translate(-50%,-40%);}
  to{opacity:1; transform:translate(-50%,-50%);}
}

@media(max-width:768px){
  .dock{display:none;}
  .desktop-icons{right:20px;}
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="topbar">
  Satyabrata@devops: ~
</div>

<div class="dock">
  <img src="https://img.icons8.com/color/48/000000/google-chrome.png"/>
  <img src="https://img.icons8.com/color/48/000000/visual-studio-code-2019.png"/>
  <img src="https://img.icons8.com/ios-filled/50/ffffff/console.png"/>
  <img src="https://img.icons8.com/color/48/000000/github--v1.png"/>
</div>

<div class="desktop-icons">
  <div class="icon">
    <img src="https://img.icons8.com/fluency/96/about.png"/>
    <div>About Me</div>
  </div>
  <div class="icon">
    <img src="https://img.icons8.com/fluency/96/portfolio.png"/>
    <div>Projects</div>
  </div>
  <div class="icon">
    <img src="https://img.icons8.com/fluency/96/github.png"/>
    <div>GitHub</div>
  </div>
</div>

<div class="center-box">
  <h1>Satyabrata Behera</h1>
  <p>DevOps Engineer | Docker | AWS | CI/CD | Automation</p>
  <button class="btn">Enter Portfolio</button>
</div>

</body>
</html>
